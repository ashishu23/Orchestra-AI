apiVersion: v1
kind: Service
metadata:
  name: knowledge-vault
  namespace: {{ include "orchestra.namespace" . }}
  labels:
    app: knowledge-vault
    {{ include "orchestra.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: knowledge-vault
  ports:
    - port: {{ .Values.knowledgeVault.port }}
      targetPort: {{ .Values.knowledgeVault.port }}
      protocol: TCP
      name: http
