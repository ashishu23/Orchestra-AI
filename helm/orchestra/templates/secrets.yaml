apiVersion: v1
kind: Secret
metadata:
  name: orchestra-secrets
  namespace: {{ include "orchestra.namespace" . }}
  labels:
    {{ include "orchestra.labels" . | nindent 4 }}
type: Opaque
data:
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | b64enc }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc }}
  QDRANT_API_KEY: {{ .Values.secrets.qdrantApiKey | b64enc }}
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | b64enc }}
