apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: executive-sandbox-hpa
  namespace: {{ include "orchestra.namespace" . }}
  labels:
    {{ include "orchestra.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: executive-sandbox
  minReplicas: {{ .Values.executiveSandbox.hpa.minReplicas }}
  maxReplicas: {{ .Values.executiveSandbox.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.executiveSandbox.hpa.cpuUtilization }}
